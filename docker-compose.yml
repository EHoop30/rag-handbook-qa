services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Default to the fully offline providers so `docker compose up` works
      # with no API keys. Override in a .env file to use real models.
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-fake}
      LLM_PROVIDER: ${LLM_PROVIDER:-fake}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      TOP_K: ${TOP_K:-4}
    depends_on:
      db:
        condition: service_healthy
